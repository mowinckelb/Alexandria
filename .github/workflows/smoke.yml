name: Smoke
on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch: {}     # Manual trigger

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Health
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://mcp.mowinckel.ai/health)
          body=$(curl -s https://mcp.mowinckel.ai/health)
          echo "$body"
          if [ "$status" != "200" ] || ! echo "$body" | grep -q '"status":"ok"'; then
            echo "::error::Health check failed (HTTP $status)"
            exit 1
          fi
          echo "✓ health OK"

      - name: Protocol
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://mcp.mowinckel.ai/alexandria)
          if [ "$status" != "200" ]; then
            echo "::error::Protocol handshake failed (HTTP $status)"
            exit 1
          fi
          echo "✓ protocol OK"

      - name: File
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' -X PUT \
            -H "Authorization: Bearer ${{ secrets.ALEXANDRIA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"content":"# CI smoke\nverification.","text":"ci"}' \
            https://mcp.mowinckel.ai/file/ci-smoke)
          if [ "$status" != "200" ]; then
            echo "::error::File publish failed (HTTP $status)"
            exit 1
          fi
          echo "✓ file OK"

      - name: Call
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${{ secrets.ALEXANDRIA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"modules":["canon/axioms"]}' \
            https://mcp.mowinckel.ai/call)
          if [ "$status" != "200" ]; then
            echo "::error::Call failed (HTTP $status)"
            exit 1
          fi
          echo "✓ call OK"

      - name: Library
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://mcp.mowinckel.ai/library/authors)
          if [ "$status" != "200" ]; then
            echo "::error::Library authors failed (HTTP $status)"
            exit 1
          fi
          echo "✓ library OK"

      - name: Vercel DNS
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' https://mowinckel.ai)
          if [ "$status" -lt 200 ] || [ "$status" -ge 400 ]; then
            echo "::error::mowinckel.ai returned HTTP $status — DNS or Vercel misconfigured"
            exit 1
          fi
          www_status=$(curl -s -o /dev/null -w '%{http_code}' https://www.mowinckel.ai)
          if [ "$www_status" -lt 200 ] || [ "$www_status" -ge 400 ]; then
            echo "::error::www.mowinckel.ai returned HTTP $www_status"
            exit 1
          fi
          echo "✓ vercel DNS OK (root=$status, www=$www_status)"
