name: Smoke
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
  workflow_run:
    workflows: [Deploy]
    types: [completed]

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.ALEXANDRIA_API_KEY }}
      SERVER: https://mcp.mowinckel.ai
      FACTORY: https://raw.githubusercontent.com/mowinckelb/alexandria/main/factory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Health (KV, D1, R2, env vars)
        run: |
          body=$(curl -sf $SERVER/health)
          echo "$body"
          # Top-level status can be 'degraded' when the awareness digest flags
          # stale clients / deprecated hits — that's signal, not an infra failure.
          # Check each infra component directly; awareness lives in its own block.
          for comp in kv d1 r2 env; do
            echo "$body" | grep -q "\"$comp\":\"ok\"" || { echo "::error::Component $comp not ok"; exit 1; }
          done
          echo "✓ health (all components)"

      - name: Protocol handshake
        run: |
          body=$(curl -sf $SERVER/alexandria)
          echo "$body" | grep -q '"protocol":"alexandria"' || { echo "::error::Handshake broken"; exit 1; }
          echo "$body" | grep -q '"/file/{name}"' || { echo "::error::Handshake missing file endpoint"; exit 1; }
          echo "$body" | grep -q '"/call"' || { echo "::error::Handshake missing call endpoint"; exit 1; }
          echo "✓ protocol handshake"

      - name: Protocol file (write → read back → verify content)
        run: |
          TIMESTAMP=$(date +%s)
          CONTENT="# Smoke $TIMESTAMP"

          # Write
          curl -sf -X PUT $SERVER/file/ci-smoke \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"$CONTENT\",\"text\":\"smoke $TIMESTAMP\"}" \
            | grep -q '"ok":true' || { echo "::error::File write failed"; exit 1; }

          # Read back and verify content matches
          READBACK=$(curl -sf $SERVER/library/${{ secrets.ALEXANDRIA_GITHUB_ID }}/ci-smoke \
            -H "Authorization: Bearer $API_KEY")
          echo "$READBACK" | grep -q "$TIMESTAMP" || { echo "::error::File read-back content mismatch"; exit 1; }

          # Handshake must report the write we just did. Guards against the
          # "handshake reads wrong table" class of bug — if this PUT doesn't
          # flip file_status to ok, the handshake and the protocol disagree.
          HANDSHAKE=$(curl -sf $SERVER/alexandria -H "Authorization: Bearer $API_KEY")
          echo "$HANDSHAKE" | grep -q '"file_status":"ok"' || {
            echo "::error::Handshake file_status not ok after PUT /file — reads don't match writes"
            echo "$HANDSHAKE"
            exit 1
          }
          echo "✓ file write + read back + handshake verified"

      - name: Protocol call (per-module feedback)
        run: |
          curl -sf -X POST $SERVER/call \
            -H "Authorization: Bearer $API_KEY" \
            -H "X-Alexandria-Client: ci-smoke" \
            -H "Content-Type: application/json" \
            -d '{"modules":[{"id":"methodology","text":"ci smoke verification"}]}' \
            | grep -q '"ok":true' || { echo "::error::Call failed"; exit 1; }

          # Verify call landed in marketplace
          MARKET=$(curl -sf $SERVER/marketplace/methodology -H "Authorization: Bearer $API_KEY")
          echo "$MARKET" | grep -q '"ci smoke verification"' || { echo "::error::Call not in marketplace"; exit 1; }

          # Handshake must reflect the call we just made. Symmetry with the
          # file assertion above — catches any future read/write drift.
          HANDSHAKE=$(curl -sf $SERVER/alexandria -H "Authorization: Bearer $API_KEY")
          echo "$HANDSHAKE" | grep -q '"call_status":"ok"' || {
            echo "::error::Handshake call_status not ok after POST /call — reads don't match writes"
            echo "$HANDSHAKE"
            exit 1
          }
          echo "✓ call + marketplace + handshake verified"

      - name: Protocol marketplace listing
        run: |
          curl -sf $SERVER/marketplace -H "Authorization: Bearer $API_KEY" \
            | grep -q '"methodology"' || { echo "::error::Marketplace listing broken"; exit 1; }
          echo "✓ marketplace"

      - name: Factory (every tracked file resolves on raw)
        run: |
          # Source of truth = git. Add or remove a factory file and smoke
          # covers it automatically — no hand list to drift. Caught a real
          # gap on first run: hand list had 14 files, the tree has 30.
          FILES=$(git ls-files factory | sed 's|^factory/||' | sort)
          [ -z "$FILES" ] && { echo "::error::no factory files tracked — checkout broken?"; exit 1; }
          COUNT=0
          for file in $FILES; do
            status=$(curl -s -o /dev/null -w '%{http_code}' "$FACTORY/$file")
            if [ "$status" != "200" ]; then
              echo "::error::Factory file $file returned $status"
              exit 1
            fi
            COUNT=$((COUNT+1))
          done
          # Anchor content checks — these two carry the bash + canon contract
          curl -sf "$FACTORY/setup.sh" | head -1 | grep -q "bash" || { echo "::error::setup.sh not valid bash"; exit 1; }
          curl -sf "$FACTORY/canon/methodology.md" | wc -c | xargs test 1000 -lt || { echo "::error::methodology.md too small"; exit 1; }
          echo "✓ factory ($COUNT files, derived from git, content verified)"

      - name: Website
        run: |
          status=$(curl -sL -o /dev/null -w '%{http_code}' https://mowinckel.ai)
          [ "$status" -ge 200 ] && [ "$status" -lt 400 ] || { echo "::error::mowinckel.ai HTTP $status"; exit 1; }
          www=$(curl -sL -o /dev/null -w '%{http_code}' https://www.mowinckel.ai)
          [ "$www" -ge 200 ] && [ "$www" -lt 400 ] || { echo "::error::www HTTP $www"; exit 1; }
          echo "✓ website ($status, www=$www)"

      - name: Stripe webhook reachable
        run: |
          # Stripe webhooks POST to /billing/webhook — verify the endpoint exists
          # An unsigned POST should return 400 or 500 (signature check fails), NOT 404
          status=$(curl -s -o /dev/null -w '%{http_code}' -X POST $SERVER/billing/webhook \
            -H "Content-Type: application/json" -d '{}')
          if [ "$status" = "404" ]; then
            echo "::error::Billing webhook endpoint missing (404)"
            exit 1
          fi
          echo "✓ stripe webhook reachable (HTTP $status — expected 400/500 without signature)"

      - name: Server paths referenced anywhere resolve (catch dead probes)
        run: |
          # Scan every file that talks to the server and verify each referenced
          # path exists. Source of truth = the files themselves. Catches:
          #   - server refactor kills a route a live client still calls
          #   - smoke step probes an endpoint we deliberately removed (the
          #     2026-04-26 /library/authors regression — meta-loop closes this)
          # Inputs (mixed by design — production reality + checked-out config):
          #   - factory/hooks/payload.sh + skills/scheduled.md (live, fetched from raw)
          #   - .github/workflows/smoke.yml (this very file, from disk)
          PAYLOAD=$(curl -sf "$FACTORY/hooks/payload.sh")
          SCHED=$(curl -sf "$FACTORY/skills/scheduled.md")
          # Strip GH Actions template lines — they yield partial paths (e.g.
          # /library/<secret>/... -> "/library/") that aren't real probes.
          # Behavioral steps that template paths are covered by their own
          # assertions; the meta-loop only catches literal probes.
          # Build the open-brace token at runtime — writing it literally in YAML
          # would itself be parsed as a GH Actions expression and break the run.
          OPEN='$'; OPEN="${OPEN}{{"
          SMOKE=$(grep -vF "$OPEN" .github/workflows/smoke.yml || true)
          SCAN=$(printf '%s\n%s\n%s\n' "$PAYLOAD" "$SCHED" "$SMOKE")
          P1=$(printf '%s' "$SCAN" | grep -oE '\$SERVER/[a-zA-Z][a-zA-Z0-9/_-]*' | sed 's|^\$SERVER||')
          P2=$(printf '%s' "$SCAN" | grep -oE 'https://mcp\.mowinckel\.ai/[a-zA-Z][a-zA-Z0-9/_-]*' | sed 's|^https://mcp\.mowinckel\.ai||')
          PATHS=$(printf '%s\n%s\n' "$P1" "$P2" | sort -u | grep -v '^$')
          [ -z "$PATHS" ] && { echo "::error::No paths extracted — regex broke?"; exit 1; }
          fail=0
          for path in $PATHS; do
            # Probe all four methods — Hono returns 404 on method mismatch, so a
            # single-method check lies for routes like PUT /file/:name or POST
            # /call. Route is alive iff at least one method returns non-404.
            # (Limitation: a route protected by a middleware that 404s on missing
            # resource — e.g. validateAuthor for /library/:author with a bad id —
            # will look dead. None of the current literal probes hit that case.)
            g=$(curl -s -o /dev/null -w '%{http_code}' -X GET "$SERVER$path")
            p=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$SERVER$path" -H 'Content-Type: application/json' -d '{}')
            u=$(curl -s -o /dev/null -w '%{http_code}' -X PUT "$SERVER$path" -H 'Content-Type: application/json' -d '{}')
            d=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE "$SERVER$path")
            if [ "$g" = "404" ] && [ "$p" = "404" ] && [ "$u" = "404" ] && [ "$d" = "404" ]; then
              echo "::error::Reference to $path → 404 on all methods (route killed but a client/test still depends on it)"
              fail=1
            else
              echo "  $path → GET:$g POST:$p PUT:$u DELETE:$d"
            fi
          done
          [ $fail -eq 1 ] && exit 1
          echo "✓ all referenced server paths resolve"

      - name: Awareness self-check (event log captures deprecated_hit)
        run: |
          # Fire a known deprecated hit, tagged ?_smoke=1 so the daily alarm
          # scanner ignores it (otherwise the test pollutes the signal it's
          # verifying). Verify via /analytics/log — confirms the full
          # write→flush→read pipeline still works.
          curl -s -o /dev/null "$SERVER/hooks/payload?_smoke=1"
          # KV event batch flushes on request boundary; brief settle for read-after-write
          sleep 3
          LOG=$(curl -sf -H "Authorization: Bearer $API_KEY" "$SERVER/analytics/log")
          echo "$LOG" | tail -100 | grep -q '"smoke":"true"' || {
            echo "::error::Smoke-tagged deprecated_hit not in recent log — write/read pipeline broken"
            exit 1
          }
          echo "✓ awareness self-check (event logged, scanner skips smoke-tagged)"
