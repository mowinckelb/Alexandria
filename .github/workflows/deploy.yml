name: Deploy
on:
  push:
    branches: [main]
    paths: ['server/src/**', 'server/wrangler.toml', 'server/package.json']
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install server deps
        run: cd server && npm ci

      - name: Type check
        run: cd server && npx tsc --noEmit

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: cd server && npx wrangler deploy 2>&1 | grep -E "Uploaded|Deployed|Version"

      - name: Verify health
        run: |
          sleep 5
          status=$(curl -s -o /dev/null -w '%{http_code}' https://mcp.mowinckel.ai/health)
          body=$(curl -s https://mcp.mowinckel.ai/health)
          echo "$body"
          if [ "$status" != "200" ] || ! echo "$body" | grep -q '"status":"ok"'; then
            echo "::error::Health check failed after deploy (HTTP $status)"
            exit 1
          fi
          echo "✓ deploy verified"
