name: Deploy
on:
  push:
    branches: [main]
    paths: ['server/src/**', 'server/wrangler.toml', 'server/package.json']
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install server deps
        run: cd server && npm ci

      - name: Type check
        run: cd server && npx tsc --noEmit

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: cd server && npx wrangler deploy 2>&1 | grep -E "Uploaded|Deployed|Version"

      - name: Verify health
        run: |
          sleep 5
          body=$(curl -sf https://mcp.mowinckel.ai/health)
          echo "$body"
          echo "$body" | grep -q '"status":"ok"' || { echo "::error::Health degraded after deploy"; exit 1; }
          echo "✓ health ok"

      - name: Trigger full smoke
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run Smoke
